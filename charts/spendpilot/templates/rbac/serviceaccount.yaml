{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ .Values.namespace.name }}
  annotations:
{{- if .Values.azure.managedIdentityClientId }}
    azure.workload.identity/client-id: {{ .Values.azure.managedIdentityClientId | quote }}
{{- end }}
{{- with .Values.serviceAccount.annotations }}
{{ toYaml . | indent 4 }}
{{- end }}
{{- end }}
