apiVersion: v1
kind: Service
metadata:
  name: spend-control-frontend
  namespace: {{ include "business-ai-app.namespace" . }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: spend-control-frontend
  ports:
    - name: http
      port: {{ .Values.frontend.service.port }}
      targetPort: 3000
