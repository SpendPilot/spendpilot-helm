apiVersion: apps/v1
kind: Deployment
metadata:
  name: spend-control-frontend
  namespace: {{ .Values.namespace.name }}
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: spend-control-frontend
  template:
    metadata:
      annotations:
        spendcontrol.io/revision: {{ .Values.rollout.revision | quote }}
      labels:
        app.kubernetes.io/name: spend-control-frontend
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
{{- if .Values.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml .Values.imagePullSecrets | indent 8 }}
{{- end }}
      containers:
        - name: frontend
          image: {{ if .Values.frontend.image.digest }}{{ printf "%s@%s" .Values.frontend.image.repository .Values.frontend.image.digest | quote }}{{ else }}{{ printf "%s:%s" .Values.frontend.image.repository .Values.frontend.image.tag | quote }}{{ end }}
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: {{ .Values.config.existingConfigMapName }}
{{- with .Values.frontend.startupProbe }}
          startupProbe:
{{ toYaml . | indent 12 }}
{{- end }}
{{- with .Values.frontend.readinessProbe }}
          readinessProbe:
{{ toYaml . | indent 12 }}
{{- end }}
{{- with .Values.frontend.livenessProbe }}
          livenessProbe:
{{ toYaml . | indent 12 }}
{{- end }}
          resources:
{{ toYaml .Values.frontend.resources | indent 12 }}
