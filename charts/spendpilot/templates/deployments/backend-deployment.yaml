---
apiVersion: batch/v1
kind: Job
metadata:
  name: spend-control-migrate
  namespace: {{ .Values.namespace.name }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      annotations:
        spendcontrol.io/revision: {{ .Values.rollout.revision | quote }}
      labels:
        azure.workload.identity/use: "true"
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ .Values.serviceAccount.name }}
{{- if .Values.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml .Values.imagePullSecrets | indent 8 }}
{{- end }}
{{- if .Values.keyVault.enabled }}
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ .Values.keyVault.secretProviderClassName }}
{{- end }}
      containers:
        - name: migrate
          image: {{ if .Values.migrationJob.image.digest }}{{ printf "%s@%s" .Values.migrationJob.image.repository .Values.migrationJob.image.digest | quote }}{{ else }}{{ printf "%s:%s" .Values.migrationJob.image.repository .Values.migrationJob.image.tag | quote }}{{ end }}
          imagePullPolicy: {{ .Values.migrationJob.image.pullPolicy }}
          command: ["sh", "-c", "alembic upgrade head"]
{{- if .Values.keyVault.enabled }}
          volumeMounts:
            - name: secrets-store
              mountPath: {{ .Values.keyVault.mountPath | quote }}
              readOnly: true
{{- end }}
          env:
            - name: SERVICE_NAME
              value: migration-job
          envFrom:
            - configMapRef:
                name: {{ .Values.config.existingConfigMapName }}
            - secretRef:
                name: {{ .Values.secrets.existingSecretName }}
{{- end }}
