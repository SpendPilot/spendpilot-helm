apiVersion: apps/v1
kind: Deployment
metadata:
  name: spend-control-identity
  namespace: {{ .Values.namespace.name }}
spec:
  replicas: {{ .Values.identityService.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: spend-control-identity
  template:
    metadata:
      annotations:
        spendcontrol.io/revision: {{ .Values.rollout.revision | quote }}
      labels:
        app.kubernetes.io/name: spend-control-identity
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
{{- if .Values.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml .Values.imagePullSecrets | indent 8 }}
{{- end }}
{{- if .Values.keyVault.enabled }}
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ .Values.keyVault.secretProviderClassName }}
{{- end }}
      containers:
        - name: identity
          image: {{ if .Values.identityService.image.digest }}{{ printf "%s@%s" .Values.identityService.image.repository .Values.identityService.image.digest | quote }}{{ else }}{{ printf "%s:%s" .Values.identityService.image.repository .Values.identityService.image.tag | quote }}{{ end }}
          imagePullPolicy: {{ .Values.identityService.image.pullPolicy }}
          ports:
            - containerPort: 8000
{{- if .Values.keyVault.enabled }}
          volumeMounts:
            - name: secrets-store
              mountPath: {{ .Values.keyVault.mountPath | quote }}
              readOnly: true
{{- end }}
          env:
            - name: SERVICE_NAME
              value: identity-service
          envFrom:
            - configMapRef:
                name: {{ .Values.config.existingConfigMapName }}
            - secretRef:
                name: {{ .Values.secrets.existingSecretName }}
{{- with .Values.identityService.startupProbe }}
          startupProbe:
{{ toYaml . | indent 12 }}
{{- end }}
{{- with .Values.identityService.readinessProbe }}
          readinessProbe:
{{ toYaml . | indent 12 }}
{{- end }}
{{- with .Values.identityService.livenessProbe }}
          livenessProbe:
{{ toYaml . | indent 12 }}
{{- end }}
          resources:
{{ toYaml .Values.identityService.resources | indent 12 }}
