apiVersion: v1
kind: Service
metadata:
  name: spend-control-identity
  namespace: {{ .Values.namespace.name }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: spend-control-identity
  ports:
    - name: http
      port: {{ .Values.identityService.service.port }}
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: spend-control-finance
  namespace: {{ .Values.namespace.name }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: spend-control-finance
  ports:
    - name: http
      port: {{ .Values.financeService.service.port }}
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: spend-control-documents
  namespace: {{ .Values.namespace.name }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: spend-control-documents
  ports:
    - name: http
      port: {{ .Values.documentsService.service.port }}
      targetPort: 8000
