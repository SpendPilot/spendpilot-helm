{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: spend-control-frontend
  namespace: {{ include "business-ai-app.namespace" . }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.routes.frontendPathPrefix | quote }}
      backendRefs:
        - name: spend-control-frontend
          port: {{ .Values.frontend.service.port }}
{{- end }}
