{{- if .Values.migrationJob.enabled }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: spend-control-migrate
  namespace: {{ include "business-ai-app.namespace" . }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      annotations:
        spendcontrol.io/revision: {{ .Values.rollout.revision | quote }}
      labels:
        azure.workload.identity/use: "true"
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "business-ai-app.serviceAccountName" . }}
{{- if .Values.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml .Values.imagePullSecrets | indent 8 }}
{{- end }}
      containers:
        - name: migrate
          image: "{{ .Values.migrationJob.image.repository }}:{{ .Values.migrationJob.image.tag }}"
          imagePullPolicy: {{ .Values.migrationJob.image.pullPolicy }}
          command: ["sh", "-c", "alembic upgrade head"]
          env:
            - name: SERVICE_NAME
              value: migration-job
          envFrom:
            - configMapRef:
                name: {{ include "business-ai-app.configMapName" . }}
            - secretRef:
                name: {{ include "business-ai-app.secretName" . }}
{{- end }}
