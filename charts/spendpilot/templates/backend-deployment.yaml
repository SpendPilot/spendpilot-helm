apiVersion: apps/v1
kind: Deployment
metadata:
  name: spend-control-identity
  namespace: {{ include "business-ai-app.namespace" . }}
spec:
  replicas: {{ .Values.identityService.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: spend-control-identity
  template:
    metadata:
      annotations:
        spendcontrol.io/revision: {{ .Values.rollout.revision | quote }}
      labels:
        app.kubernetes.io/name: spend-control-identity
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: {{ include "business-ai-app.serviceAccountName" . }}
{{- if .Values.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml .Values.imagePullSecrets | indent 8 }}
{{- end }}
      containers:
        - name: identity
          image: "{{ .Values.identityService.image.repository }}:{{ .Values.identityService.image.tag }}"
          imagePullPolicy: {{ .Values.identityService.image.pullPolicy }}
          ports:
            - containerPort: 8000
          env:
            - name: SERVICE_NAME
              value: identity-service
          envFrom:
            - configMapRef:
                name: {{ include "business-ai-app.configMapName" . }}
            - secretRef:
                name: {{ include "business-ai-app.secretName" . }}
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
          resources:
{{ toYaml .Values.identityService.resources | indent 12 }}
