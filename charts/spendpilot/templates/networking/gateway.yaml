{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ $.Values.namespace.name }}
spec:
  gatewayClassName: {{ .Values.gateway.className }}
{{- with .Values.gateway.infrastructureParametersRef }}
{{- if .name }}
  infrastructure:
    parametersRef:
      group: {{ .group | default "gateway.kgateway.dev" }}
      kind: {{ .kind | default "GatewayParameters" }}
      name: {{ .name }}
{{- end }}
{{- end }}
  listeners:
    - name: http
      port: {{ .Values.gateway.listener.port }}
      protocol: {{ .Values.gateway.listener.protocol }}
      allowedRoutes:
        namespaces:
          from: Same
{{- if .Values.gateway.tls.enabled }}
    - name: https
      port: {{ .Values.gateway.tls.port }}
      protocol: {{ .Values.gateway.tls.protocol }}
      tls:
        mode: {{ .Values.gateway.tls.mode }}
        certificateRefs:
          - kind: Secret
            name: {{ .Values.gateway.tls.certificateSecretName }}
      allowedRoutes:
        namespaces:
          from: Same
{{- end }}
{{- end }}
