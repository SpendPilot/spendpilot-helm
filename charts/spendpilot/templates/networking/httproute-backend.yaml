{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: spend-control-identity
  namespace: {{ .Values.namespace.name }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
{{- with .Values.gateway.hostnames }}
  hostnames:
{{ toYaml . | indent 4 }}
{{- end }}
  rules:
{{- range .Values.routes.identityPathPrefixes }}
    - matches:
        - path:
            type: PathPrefix
            value: {{ . | quote }}
      backendRefs:
        - name: spend-control-identity
          port: {{ $.Values.identityService.service.port }}
{{- end }}
