{{- if and .Values.secrets.create (not .Values.keyVault.enabled) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "business-ai-app.secretName" . }}
  namespace: {{ include "business-ai-app.namespace" . }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.secrets.databaseUrl | quote }}
  DEV_AUTH_SECRET: {{ .Values.secrets.devAuthSecret | quote }}
{{- end }}
