namespace:
  create: true
  name: spend-control

gateway:
  enabled: true
  className: kgateway
  name: spend-control-gateway
  infrastructureParametersRef: {}
  hostnames: []
  healthProbeRoute:
    enabled: false
  listener:
    port: 80
    protocol: HTTP
  tls:
    enabled: false
    port: 443
    protocol: HTTPS
    mode: Terminate
    certificateSecretName: spend-control-gateway-origin-tls

serviceAccount:
  create: true
  name: spend-control-workload
  annotations: {}

config:
  create: true
  existingConfigMapName: spend-control-config

imagePullSecrets: []

rollout:
  revision: ""

frontend:
  image:
    repository: spendcontrol/frontend
    tag: latest
    digest: ""
    pullPolicy: IfNotPresent
  replicaCount: 2
  service:
    port: 3000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  startupProbe:
    httpGet:
      path: /runtime-config
      port: 3000
    periodSeconds: 5
    failureThreshold: 24
  readinessProbe:
    httpGet:
      path: /runtime-config
      port: 3000
    periodSeconds: 10
    failureThreshold: 3
  livenessProbe:
    httpGet:
      path: /runtime-config
      port: 3000
    periodSeconds: 20
    failureThreshold: 3
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
  nextPublicApiBaseUrl: /api

identityService:
  image:
    repository: spendcontrol/identity
    tag: latest
    digest: ""
    pullPolicy: IfNotPresent
  replicaCount: 2
  service:
    port: 8000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  startupProbe:
    httpGet:
      path: /health
      port: 8000
    periodSeconds: 5
    failureThreshold: 24
  readinessProbe:
    httpGet:
      path: /ready
      port: 8000
    periodSeconds: 10
    failureThreshold: 3
  livenessProbe:
    httpGet:
      path: /health
      port: 8000
    periodSeconds: 20
    failureThreshold: 3
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70

financeService:
  image:
    repository: spendcontrol/finance
    tag: latest
    digest: ""
    pullPolicy: IfNotPresent
  replicaCount: 2
  service:
    port: 8000
  resources:
    requests:
      cpu: 100m
      memory: 192Mi
    limits:
      cpu: 500m
      memory: 512Mi
  startupProbe:
    httpGet:
      path: /health
      port: 8000
    periodSeconds: 5
    failureThreshold: 24
  readinessProbe:
    httpGet:
      path: /ready
      port: 8000
    periodSeconds: 10
    failureThreshold: 3
  livenessProbe:
    httpGet:
      path: /health
      port: 8000
    periodSeconds: 20
    failureThreshold: 3
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70

documentsService:
  image:
    repository: spendcontrol/documents
    tag: latest
    digest: ""
    pullPolicy: IfNotPresent
  replicaCount: 2
  service:
    port: 8000
  resources:
    requests:
      cpu: 100m
      memory: 192Mi
    limits:
      cpu: 500m
      memory: 512Mi
  startupProbe:
    httpGet:
      path: /health
      port: 8000
    periodSeconds: 5
    failureThreshold: 24
  readinessProbe:
    httpGet:
      path: /ready
      port: 8000
    periodSeconds: 10
    failureThreshold: 3
  livenessProbe:
    httpGet:
      path: /health
      port: 8000
    periodSeconds: 20
    failureThreshold: 3
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70

migrationJob:
  enabled: true
  image:
    repository: spendcontrol/identity
    tag: latest
    digest: ""
    pullPolicy: IfNotPresent

routes:
  frontendPathPrefix: /
  identityPathPrefixes:
    - /api/auth
    - /api/admin
    - /health
    - /ready
  financePathPrefixes:
    - /api/finance
  documentsPathPrefixes:
    - /api/documents
    - /api/ai

env:
  appEnv: production
  backendCorsOrigins: https://costpilot.online
  financeDefaultCurrency: INR

auth:
  mode: entra
  authority: https://login.microsoftonline.com/common
  frontendClientId: ""
  backendClientId: ""
  backendAudience: ""
  apiScope: ""
  allowedTenantIds: ""
  platformAdminEmails: ""

azure:
  tenantId: ""
  managedIdentityClientId: ""
  aiFoundryEndpoint: ""
  aiProjectEndpoint: ""
  aiModelDeployment: gpt-4o-mini
  documentIntelligenceEndpoint: ""
  storageAccountUrl: ""
  storageContainerName: expense-documents

notifications:
  enabled: false
  serviceBusFullyQualifiedNamespace: ""
  serviceBusQueueName: email-requests

keyVault:
  enabled: false
  name: ""
  secretProviderClassName: spend-control-secrets-provider
  mountPath: /mnt/secrets-store
  databaseUrlSecretName: spend-control-database-url
  devAuthSecretSecretName: spend-control-dev-auth-secret

secrets:
  create: true
  existingSecretName: spend-control-secrets
  databaseUrl: ""
  devAuthSecret: "dev-only-secret-change-me"
