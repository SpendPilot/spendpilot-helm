gateway:
  hostnames:
    - costpilot.online

env:
  appEnv: production
  backendCorsOrigins: https://costpilot.online

auth:
  mode: entra
  authority: https://login.microsoftonline.com/common

frontend:
  image:
    digest: ""
  replicaCount: 2
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70

identityService:
  image:
    digest: ""
  replicaCount: 2

financeService:
  image:
    digest: ""
  replicaCount: 2

documentsService:
  image:
    digest: ""
  replicaCount: 2

migrationJob:
  image:
    digest: ""
